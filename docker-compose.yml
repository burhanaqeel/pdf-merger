services:
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: pdf-merger-dev
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - .env.local
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      WATCHPACK_POLLING: "true"
    profiles:
      - dev

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3001}
    container_name: pdf-merger
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    env_file:
      - .env.production
    restart: unless-stopped
    profiles:
      - prod
